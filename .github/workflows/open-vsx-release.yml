# Publish to Open VSX Registry when a GitHub release is promoted from prerelease to full release.
# Downloads the VSIX from the release (no rebuild). Same trigger model as vscode-release.yml.

name: Open VSX release

on:
  release:
    types: [published, edited]

jobs:
  publish:
    name: Publish to Open VSX
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_URL=$(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | select(.name == "tish.vsix") | .url')
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "::error::Release has no asset tish.vsix. Promote the prerelease (created on main merge by CI workflow) to full release."
            exit 1
          fi
          curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" "$ASSET_URL" -o tish.vsix

      # GitHub secret: VSX_TOKEN. ovsx expects OVSX_PAT (we pass the same value).
      - name: Publish to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.VSX_TOKEN }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::Set repository secret VSX_TOKEN (https://open-vsx.org/user-settings/tokens)."
            exit 1
          fi
          npx --yes ovsx publish tish.vsix
