# Build, test, and on main push create prerelease with VSIX. Mirrors tish build-npm-binaries.yml.
# Separate vscode-release.yml publishes to Marketplace when prerelease is promoted.

name: CI (compile, build, prerelease)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Get version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Set repository URL (fork-friendly)
        run: |
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          p.repository = { type: 'git', url: process.env.REPO_URL };
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
        env:
          REPO_URL: ${{ format('{0}/{1}.git', github.server_url, github.repository) }}

      - name: Get version
        id: set_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER=""
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              npx semantic-release --dry-run 2>&1 | tee semantic-release.log
              VER=$(sed -n 's/.*Published release \([0-9.]*\).*/\1/p' semantic-release.log | head -1)
            fi
          fi
          if [ -z "$VER" ]; then
            VER=$(node -p "require('./package.json').version")
            echo "Using package.json version: $VER"
          else
            echo "Using semantic-release version: $VER"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

  release_check:
    name: Release check (semantic-release dry-run)
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Set repository URL (fork-friendly)
        run: |
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          p.repository = { type: 'git', url: process.env.REPO_URL };
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
        env:
          REPO_URL: ${{ format('{0}/{1}.git', github.server_url, github.repository) }}

      - name: Require releasable commits (conventional commits)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --dry-run 2>&1 | tee release-check.log
          if grep -q "There are no relevant changes, so no new version is released." release-check.log; then
            echo "::error::No incremental release would be triggered. Push commits that trigger a release (feat/fix/perf/BREAKING CHANGE per conventional commits)."
            exit 1
          fi
          echo "Release would be triggered — check passed."

  build:
    name: Build & package VSIX
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Set extension version for VSIX
        run: |
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          p.version = process.env.VERSION;
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
        env:
          VERSION: ${{ needs.version.outputs.version }}

      - run: npm run compile
      - run: npx --yes @vscode/vsce@3 package --out tish.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: tish-vsix
          path: tish.vsix
          if-no-files-found: error

  release:
    name: Release (prerelease via GitHub API)
    needs: [build, release_check]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Set repository URL (fork-friendly)
        run: |
          node -e "
          const fs = require('fs');
          const p = require('./package.json');
          p.repository = { type: 'git', url: process.env.REPO_URL };
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
        env:
          REPO_URL: ${{ format('{0}/{1}.git', github.server_url, github.repository) }}

      - name: Get next version (semantic-release dry-run)
        id: next_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --dry-run 2>&1 | tee release.log
          VERSION=$(sed -n 's/.*Published release \([0-9.]*\).*/\1/p' release.log | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine next version from semantic-release output"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $VERSION"

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: tish-vsix

      - name: Generate release notes from commits
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "$LAST_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "")
          else
            CHANGELOG=$(git log -30 --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "")
          fi
          [ -z "$CHANGELOG" ] && CHANGELOG="- No commits to list"
          {
            echo "## Changes"
            echo ""
            echo "$CHANGELOG"
            echo ""
          } > release-body.md

      - name: Create or update GitHub prerelease via API
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.next_version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          BODY=$(cat release-body.md)
          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"${{ github.sha }}\",\"name\":\"$TAG\",\"body\":$(echo "$BODY" | jq -Rs .),\"prerelease\":true}")
          HTTP_CODE=$(echo "$RESP" | tail -n1)
          BODY_RESP=$(echo "$RESP" | sed '$d')
          if [ "$HTTP_CODE" = "201" ]; then
            echo "Created prerelease $TAG"
            RELEASE_ID=$(echo "$BODY_RESP" | jq -r .id)
          elif [ "$HTTP_CODE" = "422" ]; then
            EXISTING=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
            RELEASE_ID=$(echo "$EXISTING" | jq -r .id)
            IS_PRERELEASE=$(echo "$EXISTING" | jq -r .prerelease)
            if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
              if [ "$IS_PRERELEASE" != "true" ]; then
                echo "::error::Tag $TAG is already a full release. Merge commits that bump the version via semantic-release."
                exit 1
              fi
              curl -s -X PATCH \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID" \
                -d "{\"target_commitish\":\"${{ github.sha }}\",\"body\":$(echo "$BODY" | jq -Rs .),\"prerelease\":true}"
              echo "Updated existing prerelease $TAG"
            else
              echo "::error::Release creation failed (422) and could not find release by tag"
              exit 1
            fi
          else
            echo "::error::Unexpected response: $HTTP_CODE"
            echo "$BODY_RESP"
            exit 1
          fi
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload VSIX to prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID="${{ steps.create_release.outputs.release_id }}"
          REPO="${{ github.repository }}"
          ASSET_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/$RELEASE_ID" | jq -r '.assets[] | select(.name=="tish.vsix") | .id')
          if [ -n "$ASSET_ID" ] && [ "$ASSET_ID" != "null" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/assets/$ASSET_ID"
          fi
          UPLOAD_URL="https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets"
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @tish.vsix \
            "${UPLOAD_URL}?name=tish.vsix"
